services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: bluebricks
      POSTGRES_PASSWORD: bluebricks
      POSTGRES_DB: blueprints
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bluebricks -d blueprints"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: bluebricks
      DB_PASSWORD: bluebricks
      DB_NAME: blueprints
      PORT: 3000
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
